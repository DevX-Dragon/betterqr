name: BetterQR CI — Generate, Decode & Report

on:
  push:
  pull_request:

jobs:
  test:
    name: QR Generate → Decode → Verify
    runs-on: ubuntu-latest

    steps:
      # ── checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── system deps for pyzbar (zbar shared library) ──────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libzbar0

      # ── install betterqr in editable mode ─────────────────────────────────
      - name: Install BetterQR (editable)
        run: pip install -e .

      # ── install test-only deps (never packaged with PyPI build) ───────────
      - name: Install test dependencies
        run: |
          pip install \
            pytest \
            pytest-json-report \
            pyzbar \
            Pillow \
            requests

      # ── run the full test suite ───────────────────────────────────────────
      - name: Run QR generation & decode tests
        run: |
          pytest tests/test_betterqr.py \
            --json-report \
            --json-report-file=report.json \
            -v
        continue-on-error: true   # always proceed to reporting step

      # ── upload QR images + zip as workflow artifact ────────────────────────
      - name: Upload QR outputs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qr-outputs
          path: |
            qr_outputs/
            qr_outputs.zip
            test_results.json
            report.json
          if-no-files-found: warn

      # ── send Discord report ───────────────────────────────────────────────
      - name: Send Discord report
        if: always()
        run: python scripts/report_to_discord.py "$DISCORD_WEBHOOK_URL"
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}